# Security gate — el portero determinista.
# Corre en cada PR y push. Build rojo = no merge. Ese es el estándar (no el doc).
# Ajusta los scripts (typecheck/lint/build) a los del proyecto que lo adopta.

name: security-gate

on:
  pull_request:
  push:
    branches: [main, master]

# Cancelar corridas viejas del mismo PR/branch.
concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks necesita historial

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (lockfile congelado)
        run: pnpm install --frozen-lockfile

      # ── INV type-safety — el typecheck no puede fallar ──────────────────────
      - name: Typecheck
        run: pnpm -r typecheck

      # ── INV-1/3 — lint estricto (reglas de seguridad en `error`) ────────────
      # Con la config ESLint estricta del estándar, esto bloquea (no es advisory).
      - name: Lint
        run: pnpm -r lint

      # ── INV-1/2/3 — build: aquí fallan las violaciones de `server-only` ─────
      # Si un componente cliente importa dominio/identidad marcados server-only,
      # el build de Next revienta acá. Es el gate primario de la fuga de bundle.
      - name: Build
        run: pnpm -r build

      # ── INV-4/6/7 — invariantes de seguridad (backstop) ─────────────────────
      - name: Semgrep (reglas de seguridad)
        run: |
          python -m pip install --quiet semgrep
          semgrep scan --config ./semgrep/security-rules.yml --error --quiet

      # ── INV-6 — secretos: ni en el árbol ni en el historial ─────────────────
      - name: Gitleaks (scan de secretos)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cadena de suministro — deps con vulnerabilidades ────────────────────
      - name: Dependency audit
        run: pnpm audit --audit-level=high

  # ── INV-5 — test negativo de RLS (opcional; requiere secrets del proyecto) ──
  # Verifica que la anon key NO puede leer las tablas de negocio vía PostgREST.
  # Es la prueba auditable de que el vector anon/PostgREST está cerrado.
  # Habilitar seteando los secrets SUPABASE_URL y SUPABASE_ANON_KEY en el repo.
  rls-negative-test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: anon NO debe leer tablas de negocio
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Coma-separado: las tablas que deben estar cerradas a anon.
          PROTECTED_TABLES: "prospects,clients,opportunities,activities"
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::notice::RLS negative test omitido (faltan secrets SUPABASE_URL/ANON_KEY)."
            exit 0
          fi
          fail=0
          IFS=',' read -ra TABLES <<< "$PROTECTED_TABLES"
          for t in "${TABLES[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "$SUPABASE_URL/rest/v1/$t?select=*&limit=1" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY")
            # Esperado: 401/403 (RLS/deny) o 404 (schema no expuesto). 200 = FUGA.
            if [ "$code" = "200" ]; then
              echo "::error::FUGA — anon leyó '$t' (HTTP 200). RLS/exposed-schema mal configurado."
              fail=1
            else
              echo "OK — '$t' cerrado a anon (HTTP $code)."
            fi
          done
          exit $fail
